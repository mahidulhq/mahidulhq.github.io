---
layout: default
---
<header>
  <h1>{{ site.title }}</h1>
  {%-if site.theme_config.show_description-%}
    <p>{{ site.description }}</p>
  {%-endif-%}
</header>

{%-include menu_item.html collection=site.data.menu.entries-%}

{{ content }}
<footer class="footer">
    <div class="w">
        <p>&copy; {{ 'now' | date: '%Y' }} {{ site.title | default: site.name }}. All rights reserved.</p>
    </div>
</footer>
