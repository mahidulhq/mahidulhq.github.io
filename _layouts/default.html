<!DOCTYPE html>
<html lang="{{ page.lang | default: "en" }}">
  {%- include head.html -%}
  <body a="{{ site.theme_config.appearance | default: "auto" }}">
    <!-- Apply saved theme early to prevent flash of default theme -->
    <script>(function(){var t=localStorage.getItem('theme');if(t)document.body.setAttribute('a',t);})()</script>
    {%- include theme-toggle.html -%}
    <main class="page-content" aria-label="Content">
      <div class="w">
        {{ content }}
      </div>
    </main>

    {%-if site.goat_counter and jekyll.environment == "production"-%}
      {%-include goat_counter.html-%}
    {%-endif-%}

    {% if page.custom_js %}
      {% for js_file in page.custom_js %}
        <script type="text/javascript" src="{{ site.baseurl }}/assets/js/{{ js_file }}.js"></script>
      {% endfor %}
    {% endif %}
  </body>
      <!-- <footer class="footer">
      <div class="w">
        <p>&copy; {{ 'now' | date: '%Y' }} {{ site.title | default: site.name }}. All rights reserved.</p>
      </div>
    </footer> -->
</html>
